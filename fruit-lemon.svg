<svg
  xmlns="http://www.w3.org/2000/svg"
  width="100"
  height="100"
  viewBox="0 0 100 100"
  role="img"
  aria-label="Lemon fruit illustration"
>
  <defs>
    <radialGradient id="lemonHighlight" cx="32%" cy="28%" r="65%">
      <stop offset="0%" stop-color="#FFF9C4" />
      <stop offset="55%" stop-color="#FFF9C4" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#FFF9C4" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="leafGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#66BB6A" />
      <stop offset="100%" stop-color="#2E7D32" />
    </linearGradient>
  </defs>

  <ellipse cx="50" cy="58" rx="40" ry="26" fill="#FDD835" />
  <ellipse cx="40" cy="48" rx="18" ry="12" fill="#FFF9C4" opacity="0.95" />
  <ellipse cx="40" cy="48" rx="26" ry="18" fill="url(#lemonHighlight)" opacity="0.7" />

  <!-- Leaf -->
  <path
    d="M62 18 C58 24, 55 30, 52 34 C58 33, 66 29, 72 22 C69 20, 66 18, 62 18 Z"
    fill="url(#leafGrad)"
  />
  <path d="M51 35 C58 33, 66 29, 72 22" fill="none" stroke="#1B2B1C" stroke-opacity="0.18" stroke-width="2" stroke-linecap="round" />

  <!-- Small zest dots -->
  <g fill="#fff" opacity="0.55">
    <circle cx="62" cy="52" r="2" />
    <circle cx="58" cy="63" r="1.6" />
    <circle cx="44" cy="64" r="1.8" />
    <circle cx="38" cy="56" r="1.4" />
  </g>
</svg>

