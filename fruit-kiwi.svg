<svg
  xmlns="http://www.w3.org/2000/svg"
  width="100"
  height="100"
  viewBox="0 0 100 100"
  role="img"
  aria-label="Kiwi fruit illustration"
>
  <defs>
    <radialGradient id="kiwiShine" cx="35%" cy="25%" r="75%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.35" />
      <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="kiwiSeedGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#E8F5E9" stop-opacity="0.75" />
    </linearGradient>
  </defs>

  <!-- Outer skin -->
  <circle cx="50" cy="50" r="50" fill="#795548" />
  <!-- Inner green -->
  <circle cx="50" cy="50" r="34" fill="#8BC34A" />

  <!-- White center -->
  <circle cx="50" cy="50" r="12" fill="#FFF" />

  <!-- Radiating seed lines -->
  <g stroke="url(#kiwiSeedGrad)" stroke-width="2.2" stroke-linecap="round">
    <path d="M50 41 L50 18" />
    <path d="M50 41 L50 18" transform="rotate(30 50 50)" />
    <path d="M50 41 L50 18" transform="rotate(60 50 50)" />
    <path d="M50 41 L50 18" transform="rotate(90 50 50)" />
    <path d="M50 41 L50 18" transform="rotate(120 50 50)" />
    <path d="M50 41 L50 18" transform="rotate(150 50 50)" />
    <path d="M50 41 L50 18" transform="rotate(180 50 50)" />
    <path d="M50 41 L50 18" transform="rotate(210 50 50)" />
    <path d="M50 41 L50 18" transform="rotate(240 50 50)" />
    <path d="M50 41 L50 18" transform="rotate(270 50 50)" />
    <path d="M50 41 L50 18" transform="rotate(300 50 50)" />
    <path d="M50 41 L50 18" transform="rotate(330 50 50)" />
  </g>

  <!-- Tiny black oval seeds -->
  <g fill="#1A1A1A" opacity="0.92">
    <ellipse cx="50" cy="31" rx="2.2" ry="3.4" />
    <ellipse cx="50" cy="69" rx="2.2" ry="3.4" />
    <ellipse cx="31" cy="50" rx="2.2" ry="3.4" />
    <ellipse cx="69" cy="50" rx="2.2" ry="3.4" />
    <ellipse cx="38" cy="38" rx="1.8" ry="3" />
    <ellipse cx="62" cy="62" rx="1.8" ry="3" />
    <ellipse cx="62" cy="38" rx="1.8" ry="3" />
    <ellipse cx="38" cy="62" rx="1.8" ry="3" />
  </g>

  <circle cx="38" cy="32" r="28" fill="url(#kiwiShine)" opacity="0.85" />
</svg>

