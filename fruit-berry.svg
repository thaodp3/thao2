<svg
  xmlns="http://www.w3.org/2000/svg"
  width="140"
  height="120"
  viewBox="0 0 140 120"
  role="img"
  aria-label="Berry cluster illustration"
>
  <defs>
    <radialGradient id="berryShine" cx="30%" cy="25%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.55" />
      <stop offset="45%" stop-color="#FFFFFF" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="berryStemGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5D4037" />
      <stop offset="100%" stop-color="#3E2723" />
    </linearGradient>
  </defs>

  <g fill="#F06292">
    <!-- sizes: 40px, 32px, 28px (interpreted as diameters) -->
    <circle cx="68" cy="70" r="20" />
    <circle cx="52" cy="60" r="16" />
    <circle cx="86" cy="56" r="14" />
  </g>

  <g fill="url(#berryShine)" opacity="0.75">
    <circle cx="56" cy="52" r="26" />
  </g>

  <!-- Stem lines -->
  <g stroke="url(#berryStemGrad)" stroke-width="3" stroke-linecap="round" fill="none">
    <path d="M66 48 C66 36, 62 28, 58 24" />
    <path d="M86 50 C86 40, 84 30, 78 24" opacity="0.85" />
  </g>
</svg>

