<svg
  xmlns="http://www.w3.org/2000/svg"
  width="120"
  height="120"
  viewBox="0 0 120 120"
  role="img"
  aria-label="Orange fruit illustration"
>
  <defs>
    <radialGradient id="orangeShine" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.55" />
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="leafGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#66BB6A" />
      <stop offset="100%" stop-color="#2E7D32" />
    </linearGradient>
  </defs>

  <circle cx="60" cy="60" r="56" fill="#FFE0B2" />
  <circle cx="60" cy="60" r="44" fill="#FF9800" />

  <!-- 8 radiating segments -->
  <g fill="#F57C00">
    <polygon points="60,60 116,60 99.6,99.6" />
    <polygon points="60,60 99.6,99.6 60,116" />
    <polygon points="60,60 60,116 20.4,99.6" />
    <polygon points="60,60 20.4,99.6 4,60" />
    <polygon points="60,60 4,60 20.4,20.4" />
    <polygon points="60,60 20.4,20.4 60,4" />
    <polygon points="60,60 60,4 99.6,20.4" />
    <polygon points="60,60 99.6,20.4 116,60" />
  </g>

  <circle cx="46" cy="44" r="38" fill="url(#orangeShine)" opacity="0.8" />

  <!-- Leaf -->
  <path
    d="M60 18 C55 30, 45 38, 40 30 C48 28, 52 22, 60 18 Z"
    fill="url(#leafGrad)"
  />
  <path
    d="M60 18 C56 30, 55 42, 52 50"
    fill="none"
    stroke="#1B2B1C"
    stroke-opacity="0.18"
    stroke-width="2"
    stroke-linecap="round"
  />
</svg>

